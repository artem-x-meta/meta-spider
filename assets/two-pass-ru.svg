<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="509" rx="14" fill="#11141b" stroke="#262b37"/>

  <!-- ===== Pass 1 ===== -->
  <text x="40" y="48" fill="#6ea8fe" font-size="14" font-weight="700">Pass 1 — чтение</text>

  <rect x="40" y="62" width="120" height="64" rx="9" fill="#1a1f29" stroke="#3a4456"/>
  <text x="100" y="99" fill="#e6e9ef" font-size="13" font-weight="600" text-anchor="middle">промпт</text>

  <rect x="200" y="62" width="330" height="64" rx="9" fill="#1a2030" stroke="#6ea8fe"/>
  <text x="216" y="88" fill="#cfd6e2" font-size="13" font-weight="600">Замороженная база</text>
  <text x="216" y="106" fill="#9aa3b2" font-size="10.5">хуки снимают скрытые состояния</text>
  <text x="216" y="122" fill="#9aa3b2" font-size="10.5">с выбранных слоёв</text>

  <rect x="570" y="62" width="290" height="64" rx="9" fill="#182030" stroke="#6ea8fe"/>
  <text x="586" y="88" fill="#6ea8fe" font-size="13" font-weight="600">Когнитивный энкодер</text>
  <text x="586" y="106" fill="#9aa3b2" font-size="10.5">→ когнитивные токены</text>
  <text x="586" y="122" fill="#9aa3b2" font-size="10.5">(по одному на слой)</text>

  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M160,94 L196,94"/>
    <path d="M530,94 L566,94"/>
    <path d="M700,128 L548,228"/>
  </g>

  <!-- ===== Buffer ===== -->
  <rect x="270" y="230" width="360" height="58" rx="10" fill="#182030" stroke="#6ea8fe" stroke-width="1.6"/>
  <text x="450" y="257" fill="#6ea8fe" font-size="13" font-weight="600" text-anchor="middle">Буфер · когнитивные токены</text>
  <text x="450" y="276" fill="#9aa3b2" font-size="10.5" text-anchor="middle">заполняется в Pass 1 → читается в Pass 2</text>

  <!-- ===== Pass 2 ===== -->
  <text x="40" y="330" fill="#7ee0c0" font-size="14" font-weight="700">Pass 2 — запись</text>

  <rect x="40" y="344" width="120" height="68" rx="9" fill="#1a1f29" stroke="#3a4456"/>
  <text x="100" y="382" fill="#e6e9ef" font-size="12.5" font-weight="600" text-anchor="middle">тот же промпт</text>

  <rect x="200" y="340" width="360" height="76" rx="9" fill="#16241f" stroke="#7ee0c0"/>
  <text x="216" y="368" fill="#cfd6e2" font-size="13" font-weight="600">Замороженная база</text>
  <text x="216" y="386" fill="#9aa3b2" font-size="10.5">головы мета-внимания впрыскивают токены</text>
  <text x="216" y="402" fill="#9aa3b2" font-size="10.5">через cross-attention × tanh(врата)</text>

  <rect x="600" y="344" width="260" height="68" rx="9" fill="#16241f" stroke="#7ee0c0"/>
  <text x="616" y="375" fill="#7ee0c0" font-size="13" font-weight="600">Ответ / отказ</text>
  <text x="616" y="393" fill="#9aa3b2" font-size="10.5">калиброванный</text>

  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M160,378 L196,378"/>
    <path d="M560,378 L596,378"/>
    <path d="M430,290 L398,336"/>
  </g>

  <!-- note -->
  <text x="450" y="470" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">одна и та же замороженная база прогоняется дважды; обучается только обвязка</text>
</svg>
