<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f0b86e"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="529" rx="14" fill="#11141b" stroke="#262b37"/>
  <text x="40" y="42" fill="#cfd6e2" font-size="15" font-weight="700">The gain knob — one runtime dial over the whole uncertainty channel</text>
  <text x="40" y="62" fill="#9aa3b2" font-size="11">gain = injection strength. AGC keeps the loop from running away; one fader sets the working point.</text>

  <!-- ===== potentiometer track ===== -->
  <text x="60" y="108" fill="#f0b86e" font-size="13" font-weight="700">gain</text>
  <line x1="120" y1="120" x2="820" y2="120" stroke="#3a4456" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="120" x2="560" y2="120" stroke="#2f5a8a" stroke-width="6" stroke-linecap="round"/>
  <!-- ticks -->
  <g fill="#9aa3b2" font-size="10.5" text-anchor="middle">
    <circle cx="120" cy="120" r="4" fill="#3a4456"/><text x="120" y="146">0.0</text><text x="120" y="160" fill="#7a8493">base (off)</text>
    <circle cx="428" cy="120" r="4" fill="#3a4456"/><text x="428" y="146">0.7</text>
    <circle cx="560" cy="120" r="9" fill="#f0b86e" stroke="#11141b" stroke-width="2"/><text x="560" y="148" fill="#f0b86e" font-weight="700">1.0</text><text x="560" y="162" fill="#7a8493">trained baseline</text>
    <circle cx="736" cy="120" r="4" fill="#3a4456"/><text x="736" y="146">1.5</text>
    <circle cx="820" cy="120" r="4" fill="#3a4456"/><text x="820" y="146">2.0</text><text x="820" y="160" fill="#7a8493">max caution</text>
  </g>

  <!-- ===== response curve ===== -->
  <text x="60" y="232" fill="#cfd6e2" font-size="12" font-weight="700">refusal rate vs gain</text>
  <text x="60" y="250" fill="#9aa3b2" font-size="10.5">monotonic 2% → 51%, plateau ~1.5–2.0 (measured, Gemma-4-12B)</text>
  <!-- axes -->
  <line x1="150" y1="300" x2="150" y2="470" stroke="#3a4456" stroke-width="1.5"/>
  <line x1="150" y1="470" x2="800" y2="470" stroke="#3a4456" stroke-width="1.5"/>
  <text x="120" y="306" fill="#9aa3b2" font-size="10" text-anchor="end">51%</text>
  <text x="120" y="468" fill="#9aa3b2" font-size="10" text-anchor="end">2%</text>
  <text x="150" y="490" fill="#7a8493" font-size="10" text-anchor="middle">0</text>
  <text x="800" y="490" fill="#7a8493" font-size="10" text-anchor="middle">gain 2.0</text>
  <!-- curve: (0,2%)~bottom to plateau at ~1.5 -->
  <path d="M150,463 C300,452 420,360 560,322 C640,302 720,298 800,297" stroke="#f0b86e" stroke-width="3" fill="none"/>
  <!-- sample points -->
  <g fill="#f0b86e">
    <circle cx="150" cy="463" r="4"/><circle cx="424" cy="372" r="4"/><circle cx="560" cy="322" r="4"/><circle cx="736" cy="300" r="4"/>
  </g>
  <g fill="#9aa3b2" font-size="9.5" text-anchor="middle">
    <text x="424" y="362">~25%</text><text x="560" y="312">~40%</text>
  </g>

  <!-- ===== side note: what the knob is ===== -->
  <rect x="540" y="350" width="320" height="104" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="558" y="374" fill="#f0b86e" font-size="11.5" font-weight="700">runtime control</text>
  <text x="558" y="396" fill="#9aa3b2" font-size="10.5">• isolated latent channel over the residual</text>
  <text x="558" y="414" fill="#9aa3b2" font-size="10.5">• one knob, set live (set_gain / META_GAIN)</text>
  <text x="558" y="432" fill="#9aa3b2" font-size="10.5">• N modifiers sum on the residual, each its own gain</text>
</svg>
