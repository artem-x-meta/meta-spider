<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="559" rx="14" fill="#11141b" stroke="#262b37"/>

  <text x="40" y="44" fill="#cfd6e2" font-size="13.5" font-weight="700">meta-spider — five pip packages: the mechanism, the voices, and three consumers</text>

  <!-- ===== consumers ===== -->
  <!-- meta-loom -->
  <rect x="40" y="74" width="257" height="140" rx="10" fill="#211c12" stroke="#f0b86e"/>
  <text x="58" y="104" fill="#f0b86e" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-loom</text>
  <text x="58" y="123" fill="#cfd6e2" font-size="11" font-weight="600">training &amp; evaluation</text>
  <text x="58" y="146" fill="#9aa3b2" font-size="10.3">collect activations, train the voices</text>
  <text x="58" y="161" fill="#9aa3b2" font-size="10.3">(backprop through the frozen base),</text>
  <text x="58" y="176" fill="#9aa3b2" font-size="10.3">measure their value-add honestly.</text>
  <text x="58" y="196" fill="#9aa3b2" font-size="10.3">metaloom CLI + wrapper factory</text>

  <!-- meta-agent -->
  <rect x="321" y="74" width="257" height="140" rx="10" fill="#16241f" stroke="#7ee0c0"/>
  <text x="339" y="104" fill="#7ee0c0" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-agent</text>
  <text x="339" y="123" fill="#cfd6e2" font-size="11" font-weight="600">agentic runtime &amp; chat</text>
  <text x="339" y="146" fill="#9aa3b2" font-size="10.3">run the wrapper in an agent</text>
  <text x="339" y="161" fill="#9aa3b2" font-size="10.3">loop with tools and history;</text>
  <text x="339" y="176" fill="#9aa3b2" font-size="10.3">native tool-use for instruct models</text>

  <!-- meta-deploy -->
  <rect x="602" y="74" width="258" height="140" rx="10" fill="#1d1726" stroke="#b496f0"/>
  <text x="620" y="104" fill="#b496f0" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-deploy</text>
  <text x="620" y="123" fill="#cfd6e2" font-size="11" font-weight="600">deploy to llama.cpp</text>
  <text x="620" y="146" fill="#9aa3b2" font-size="10.3">export to a GGUF sidecar +</text>
  <text x="620" y="161" fill="#9aa3b2" font-size="10.3">ggml/C++ forward → calibrated refusal</text>
  <text x="620" y="176" fill="#9aa3b2" font-size="10.3">without CUDA/PyTorch (CPU · edge)</text>

  <!-- loom → agent secondary edge -->
  <path d="M297,144 L319,144" stroke="#6e7688" stroke-width="1.4" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="309" y="136" fill="#6e7688" font-size="8.5" text-anchor="middle">calls</text>

  <!-- ===== the voices: meta-daimon ===== -->
  <rect x="40" y="252" width="420" height="98" rx="10" fill="#241a16" stroke="#d9776c" stroke-width="1.8"/>
  <text x="60" y="282" fill="#d9776c" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-daimon</text>
  <text x="185" y="282" fill="#cfd6e2" font-size="11.5" font-weight="600">· the VOICES (injection modifiers)</text>
  <text x="60" y="305" fill="#9aa3b2" font-size="10.3">the frozen model's inner advisers (Socratic daimonion: counsels, doesn't rule):</text>
  <text x="60" y="321" fill="#9aa3b2" font-size="10.3">Doubter (doubt) · GoalAnchor (goal; in validation) · each voice has its own gain fader</text>
  <text x="60" y="337" fill="#9aa3b2" font-size="10.3">voices SUM on the residual — a mixing console over one mechanism</text>

  <!-- edges: loom → daimon; daimon → core; agent/deploy → core -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M168,214 L168,250"/>
    <path d="M250,350 L250,392"/>
    <path d="M520,214 L520,392"/>
    <path d="M731,214 L731,392"/>
  </g>
  <text x="168" y="240" fill="#9aa3b2" font-size="9" text-anchor="start" dx="8">trains the voices</text>
  <text x="250" y="378" fill="#9aa3b2" font-size="9" text-anchor="start" dx="8">speak through the mechanism</text>

  <!-- ===== core (foundation) ===== -->
  <rect x="40" y="394" width="820" height="108" rx="10" fill="#182030" stroke="#6ea8fe" stroke-width="1.8"/>
  <text x="60" y="426" fill="#6ea8fe" font-size="15.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-core</text>
  <text x="168" y="426" fill="#cfd6e2" font-size="12.5" font-weight="600">· the meta-attention MECHANISM</text>
  <text x="60" y="450" fill="#9aa3b2" font-size="10.5">two-pass mechanism: frozen base + hooks · cognitive encoders · gated cross-attention ·</text>
  <text x="60" y="468" fill="#9aa3b2" font-size="10.5">the Modifier contract · read-side Watchdog probe · checkpoint contract · depends on nothing</text>
  <rect x="580" y="422" width="264" height="26" rx="7" fill="#16241f" stroke="#7ee0c0"/>
  <text x="712" y="439" fill="#7ee0c0" font-size="10.5" font-weight="600" text-anchor="middle">prod inference = core + daimon only</text>

  <!-- note -->
  <text x="450" y="532" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">one mechanism (core), one family of voices speaking through it (daimon), three independent consumers</text>
</svg>
