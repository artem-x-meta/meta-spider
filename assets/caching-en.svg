<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="499" rx="14" fill="#11141b" stroke="#262b37"/>

  <!-- ===== Problem: 2x ===== -->
  <text x="40" y="46" fill="#f0b86e" font-size="14" font-weight="700">Naive: the wrapper runs the base twice → ~2× the base's time</text>

  <!-- base stack (1x) -->
  <g fill="#3b6ea8">
    <rect x="70" y="64" width="40" height="12" rx="2"/><rect x="70" y="78" width="40" height="12" rx="2"/>
    <rect x="70" y="92" width="40" height="12" rx="2"/><rect x="70" y="106" width="40" height="12" rx="2"/>
    <rect x="70" y="120" width="40" height="12" rx="2"/><rect x="70" y="134" width="40" height="12" rx="2"/>
  </g>
  <text x="90" y="166" fill="#cfd6e2" font-size="11" text-anchor="middle">base</text>
  <text x="90" y="180" fill="#9aa3b2" font-size="10" text-anchor="middle">1 pass · 1×</text>

  <text x="150" y="108" fill="#7a8493" font-size="22">→</text>

  <!-- doubter naive (2x) -->
  <g fill="#3b6ea8">
    <rect x="210" y="64" width="40" height="12" rx="2"/><rect x="210" y="78" width="40" height="12" rx="2"/>
    <rect x="210" y="92" width="40" height="12" rx="2"/><rect x="210" y="106" width="40" height="12" rx="2"/>
    <rect x="210" y="120" width="40" height="12" rx="2"/><rect x="210" y="134" width="40" height="12" rx="2"/>
    <rect x="258" y="64" width="40" height="12" rx="2"/><rect x="258" y="78" width="40" height="12" rx="2"/>
    <rect x="258" y="92" width="40" height="12" rx="2"/><rect x="258" y="106" width="40" height="12" rx="2"/>
    <rect x="258" y="120" width="40" height="12" rx="2"/><rect x="258" y="134" width="40" height="12" rx="2"/>
  </g>
  <text x="254" y="166" fill="#cfd6e2" font-size="11" text-anchor="middle">naive Doubter</text>
  <text x="254" y="180" fill="#9aa3b2" font-size="10" text-anchor="middle">Pass 1 + Pass 2</text>
  <text x="330" y="108" fill="#f0b86e" font-size="22" font-weight="700">2×</text>

  <!-- callout -->
  <rect x="430" y="62" width="430" height="94" rx="10" fill="#14181f" stroke="#2a3140"/>
  <text x="448" y="90" fill="#cfd6e2" font-size="12" font-weight="600">The idea</text>
  <text x="448" y="110" fill="#9aa3b2" font-size="10.5">The base is frozen → its activations for a given input</text>
  <text x="448" y="126" fill="#9aa3b2" font-size="10.5">never change → anything independent of the wrapper</text>
  <text x="448" y="142" fill="#9aa3b2" font-size="10.5">is computed once and cached.</text>

  <!-- ===== Three levels of caching ===== -->
  <text x="40" y="210" fill="#cfd6e2" font-size="13.5" font-weight="700">Three levels of caching — what we cache · why it's possible · what it saves</text>

  <!-- card 1 -->
  <rect x="40" y="226" width="257" height="190" rx="10" fill="#1a2030" stroke="#6ea8fe"/>
  <circle cx="64" cy="252" r="13" fill="#6ea8fe"/>
  <text x="64" y="256.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="86" y="257" fill="#6ea8fe" font-size="12.5" font-weight="600">Training · Pass-1</text>
  <text x="58" y="296" fill="#cfd6e2" font-size="10.5">Cache: hidden snapshots</text>
  <text x="58" y="311" fill="#9aa3b2" font-size="10.5">of target layers (collect)</text>
  <text x="58" y="336" fill="#cfd6e2" font-size="10.5">Possible: base frozen →</text>
  <text x="58" y="351" fill="#9aa3b2" font-size="10.5">Pass-1 is constant</text>
  <rect x="56" y="372" width="225" height="26" rx="7" fill="#16241f" stroke="#7ee0c0"/>
  <text x="66" y="389" fill="#7ee0c0" font-size="10.5" font-weight="600">Saves: −1 full forward per epoch</text>

  <!-- card 2 -->
  <rect x="321" y="226" width="257" height="190" rx="10" fill="#1a2030" stroke="#6ea8fe"/>
  <circle cx="345" cy="252" r="13" fill="#6ea8fe"/>
  <text x="345" y="256.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="367" y="257" fill="#6ea8fe" font-size="12.5" font-weight="600">Training · Pass-2 (slice)</text>
  <text x="339" y="296" fill="#cfd6e2" font-size="10.5">Cache: cut_hidden =</text>
  <text x="339" y="311" fill="#9aa3b2" font-size="10.5">output of layer[cut]</text>
  <text x="339" y="336" fill="#cfd6e2" font-size="10.5">Possible: bottom has no</text>
  <text x="339" y="351" fill="#9aa3b2" font-size="10.5">injection — same both passes</text>
  <rect x="337" y="372" width="225" height="26" rx="7" fill="#16241f" stroke="#7ee0c0"/>
  <text x="347" y="389" fill="#7ee0c0" font-size="10.5" font-weight="600">Saves: skip the bottom ⅔ of layers</text>

  <!-- card 3 -->
  <rect x="602" y="226" width="258" height="190" rx="10" fill="#1c241f" stroke="#7ee0c0"/>
  <circle cx="626" cy="252" r="13" fill="#7ee0c0"/>
  <text x="626" y="256.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="648" y="257" fill="#7ee0c0" font-size="12.5" font-weight="600">Inference</text>
  <text x="620" y="296" fill="#cfd6e2" font-size="10.5">Cache: cognitive tokens</text>
  <text x="620" y="311" fill="#9aa3b2" font-size="10.5">+ base KV-cache</text>
  <text x="620" y="336" fill="#cfd6e2" font-size="10.5">Possible: state changes</text>
  <text x="620" y="351" fill="#9aa3b2" font-size="10.5">slowly, prefix is ready</text>
  <rect x="618" y="372" width="225" height="26" rx="7" fill="#16241f" stroke="#7ee0c0"/>
  <text x="628" y="389" fill="#7ee0c0" font-size="10.5" font-weight="600">Saves: dynamic refresh, no O(n²)</text>

  <!-- note -->
  <text x="450" y="460" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">one root cause — a frozen base makes its activations cacheable</text>
</svg>
