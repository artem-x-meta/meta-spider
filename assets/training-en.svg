<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f0b86e"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="559" rx="14" fill="#11141b" stroke="#262b37"/>

  <!-- ===== 1. Data collection ===== -->
  <text x="40" y="44" fill="#cfd6e2" font-size="13.5" font-weight="700">1 · Data collection (collector + oracle)</text>

  <rect x="60" y="58" width="180" height="66" rx="9" fill="#1a1f29" stroke="#3a4456"/>
  <text x="150" y="88" fill="#e6e9ef" font-size="13" font-weight="600" text-anchor="middle">questions</text>
  <text x="150" y="106" fill="#9aa3b2" font-size="10" text-anchor="middle">the model may refuse</text>
  <text x="150" y="120" fill="#9aa3b2" font-size="10" text-anchor="middle">if unsure</text>

  <rect x="300" y="58" width="540" height="66" rx="9" fill="#1a2030" stroke="#6ea8fe"/>
  <text x="316" y="84" fill="#6ea8fe" font-size="13" font-weight="600">Collector</text>
  <text x="316" y="102" fill="#9aa3b2" font-size="10.5">runs the questions through the base · captures activations (Pass 1)</text>
  <text x="316" y="119" fill="#9aa3b2" font-size="10.5">checks the answer against ground truth — oracle: right / wrong</text>

  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M240,91 L296,91"/>
    <path d="M560,124 L472,172"/>
    <path d="M372,238 L236,316"/>
  </g>

  <!-- ===== Dataset ===== -->
  <rect x="230" y="176" width="440" height="62" rx="10" fill="#182030" stroke="#6ea8fe" stroke-width="1.6"/>
  <text x="450" y="200" fill="#6ea8fe" font-size="13" font-weight="600" text-anchor="middle">Dataset</text>
  <text x="450" y="220" fill="#9aa3b2" font-size="10.5" text-anchor="middle">activations + label:  right → confirm · wrong → refuse</text>

  <!-- ===== 2. Training step ===== -->
  <text x="40" y="304" fill="#cfd6e2" font-size="13.5" font-weight="700">2 · Training step — forward → · backward ←</text>

  <rect x="60" y="320" width="200" height="88" rx="10" fill="#1a2030" stroke="#6ea8fe"/>
  <text x="76" y="348" fill="#6ea8fe" font-size="13" font-weight="600">Wrapper</text>
  <text x="76" y="367" fill="#cfd6e2" font-size="10.5">encoder + heads</text>
  <text x="76" y="385" fill="#9aa3b2" font-size="10">encodes activations,</text>
  <text x="76" y="400" fill="#9aa3b2" font-size="10">regulates the injection</text>

  <rect x="310" y="320" width="300" height="88" rx="10" fill="#1a1f29" stroke="#3a4456"/>
  <text x="326" y="348" fill="#cfd6e2" font-size="13" font-weight="600">Frozen base</text>
  <text x="326" y="368" fill="#9aa3b2" font-size="10.5">two-pass injection</text>
  <text x="326" y="385" fill="#9aa3b2" font-size="10.5">weights do NOT change —</text>
  <text x="326" y="401" fill="#9aa3b2" font-size="10.5">but the compute graph through it exists</text>

  <rect x="660" y="320" width="180" height="88" rx="10" fill="#211c12" stroke="#f0b86e"/>
  <text x="676" y="348" fill="#f0b86e" font-size="13" font-weight="600">LM loss</text>
  <text x="676" y="368" fill="#9aa3b2" font-size="10.5">vs label:</text>
  <text x="676" y="385" fill="#9aa3b2" font-size="10.5">confirm /</text>
  <text x="676" y="401" fill="#9aa3b2" font-size="10.5">refuse</text>

  <!-- forward -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M260,364 L306,364"/>
    <path d="M610,364 L656,364"/>
  </g>

  <!-- backward (gradient) -->
  <path d="M748,410 C748,470 160,470 160,412" stroke="#f0b86e" stroke-width="2.2" fill="none" marker-end="url(#arrg)"/>
  <text x="454" y="492" fill="#f0b86e" font-size="11.5" text-anchor="middle">backward — the gradient flows through the frozen base back to the wrapper</text>

  <!-- banner -->
  <text x="450" y="528" fill="#9aa3b2" font-size="12.5" text-anchor="middle" font-style="italic">in effect the base LLM itself is the loss function for the wrapper</text>
</svg>
