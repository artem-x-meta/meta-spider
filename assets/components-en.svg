<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="529" rx="14" fill="#11141b" stroke="#262b37"/>

  <!-- frozen base -->
  <rect x="40" y="36" width="818" height="48" rx="9" fill="#1a1f29" stroke="#3a4456"/>
  <text x="449" y="65" fill="#cfd6e2" font-size="14" font-weight="600" text-anchor="middle">Frozen base — layers  L0 · L1 · … · Ln</text>

  <!-- loop arrows -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M132,86 L132,196"/>
    <path d="M766,196 L766,86"/>
  </g>
  <text x="146" y="126" fill="#9aa3b2" font-size="11">read</text>
  <text x="146" y="141" fill="#9aa3b2" font-size="11">activations</text>
  <text x="752" y="126" fill="#7ee0c0" font-size="11" text-anchor="end">inject back</text>
  <text x="752" y="141" fill="#9aa3b2" font-size="11" text-anchor="end">(cross-attention)</text>
  <text x="449" y="160" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">an introspection loop over the same frozen base</text>

  <!-- flow between cards -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M226,278 L248,278"/>
    <path d="M437,278 L459,278"/>
    <path d="M648,278 L670,278"/>
  </g>

  <!-- card 1: hooks -->
  <rect x="40" y="200" width="185" height="160" rx="10" fill="#1a2030" stroke="#6ea8fe"/>
  <circle cx="62" cy="224" r="12" fill="#6ea8fe"/>
  <text x="62" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="54" y="262" fill="#6ea8fe" font-size="12.5" font-weight="600">Activation hooks</text>
  <text x="54" y="288" fill="#aab2c0" font-size="10.5">capture the model's</text>
  <text x="54" y="304" fill="#aab2c0" font-size="10.5">hidden states at the</text>
  <text x="54" y="320" fill="#aab2c0" font-size="10.5">target layers</text>

  <!-- card 2: encoder -->
  <rect x="251" y="200" width="185" height="160" rx="10" fill="#182030" stroke="#6ea8fe"/>
  <circle cx="273" cy="224" r="12" fill="#6ea8fe"/>
  <text x="273" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="265" y="262" fill="#6ea8fe" font-size="12.5" font-weight="600">Cognitive encoder</text>
  <text x="265" y="288" fill="#aab2c0" font-size="10.5">compress activations</text>
  <text x="265" y="304" fill="#aab2c0" font-size="10.5">into cognitive tokens —</text>
  <text x="265" y="320" fill="#aab2c0" font-size="10.5">one per layer</text>

  <!-- card 3: gates -->
  <rect x="462" y="200" width="185" height="160" rx="10" fill="#211c12" stroke="#f0b86e"/>
  <circle cx="484" cy="224" r="12" fill="#f0b86e"/>
  <text x="484" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="476" y="262" fill="#f0b86e" font-size="12.5" font-weight="600">Gates</text>
  <text x="476" y="288" fill="#aab2c0" font-size="10.5">scalar multiplier: how</text>
  <text x="476" y="304" fill="#aab2c0" font-size="10.5">much introspection a</text>
  <text x="476" y="320" fill="#aab2c0" font-size="10.5">layer needs (tanh)</text>

  <!-- card 4: heads -->
  <rect x="673" y="200" width="185" height="160" rx="10" fill="#16241f" stroke="#7ee0c0"/>
  <circle cx="695" cy="224" r="12" fill="#7ee0c0"/>
  <text x="695" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <text x="687" y="262" fill="#7ee0c0" font-size="12.5" font-weight="600">Meta-attention heads</text>
  <text x="687" y="288" fill="#aab2c0" font-size="10.5">one head per layer.</text>
  <text x="687" y="304" fill="#aab2c0" font-size="10.5">cross-attention: how much</text>
  <text x="687" y="320" fill="#aab2c0" font-size="10.5">of each cognitive token</text>
  <text x="687" y="336" fill="#aab2c0" font-size="10.5">to mix into its layer</text>

  <!-- formula strip -->
  <text x="449" y="424" fill="#9aa3b2" font-size="13" text-anchor="middle" font-family="ui-monospace, Consolas, monospace">hidden  +=  tanh(<tspan fill="#f0b86e">gate</tspan>) · <tspan fill="#7ee0c0">CA</tspan>(hidden, <tspan fill="#6ea8fe">cognitive tokens</tspan>)</text>
  <text x="449" y="456" fill="#6e7688" font-size="11" text-anchor="middle">Q — from the layer's live hidden · K/V — from cognitive tokens · base stays frozen</text>
</svg>
