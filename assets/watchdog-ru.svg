<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
    <marker id="arro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f0b86e"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="559" rx="14" fill="#11141b" stroke="#262b37"/>
  <text x="40" y="42" fill="#cfd6e2" font-size="15" font-weight="700">Сторож (Watchdog) — датчик неуверенности, который ГЕЙТИТ сильные действия</text>
  <text x="40" y="62" fill="#9aa3b2" font-size="11">читает сигнал в точке решения и открывает канал только там: точечная инъекция в окно решения — или внешний поиск.</text>

  <!-- ===== путь чтения ===== -->
  <g>
    <rect x="40" y="100" width="120" height="52" rx="8" fill="#0e1622" stroke="#3a4456"/>
    <text x="100" y="124" fill="#cfd6e2" font-size="11.5" text-anchor="middle">запрос</text>
    <text x="100" y="140" fill="#7a8493" font-size="9.5" text-anchor="middle">«какой API для X?»</text>

    <path d="M160,126 L196,126" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="200" y="100" width="140" height="52" rx="8" fill="#0e1622" stroke="#3a4456"/>
    <text x="270" y="122" fill="#cfd6e2" font-size="11.5" text-anchor="middle">замороженная LLM</text>
    <text x="270" y="138" fill="#7a8493" font-size="9.5" text-anchor="middle">Pass-1 (чтение состояния)</text>

    <path d="M340,126 L376,126" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="380" y="100" width="130" height="52" rx="8" fill="#0e1622" stroke="#3a4456"/>
    <text x="445" y="122" fill="#cfd6e2" font-size="11.5" text-anchor="middle">когнитивный токен</text>
    <text x="445" y="138" fill="#7a8493" font-size="9.5" text-anchor="middle">энкодер @ поздние слои</text>

    <path d="M510,126 L546,126" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

    <rect x="550" y="100" width="150" height="52" rx="8" fill="#0e1622" stroke="#f0b86e"/>
    <text x="625" y="122" fill="#f0b86e" font-size="11.5" font-weight="700" text-anchor="middle">ConfidenceProbe</text>
    <text x="625" y="138" fill="#9aa3b2" font-size="9.5" text-anchor="middle">линейная, AUC 0.715</text>

    <path d="M700,126 L736,126" stroke="#f0b86e" stroke-width="2" marker-end="url(#arro)"/>

    <rect x="740" y="100" width="120" height="52" rx="8" fill="#0e1622" stroke="#3a4456"/>
    <text x="800" y="124" fill="#cfd6e2" font-size="11.5" text-anchor="middle">вердикт</text>
    <text x="800" y="140" fill="#7a8493" font-size="9.5" text-anchor="middle">не уверена?</text>
  </g>

  <!-- ===== ветвление ===== -->
  <path d="M786,152 C700,168 400,168 236,196" stroke="#8a93a6" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M800,152 L800,196" stroke="#f0b86e" stroke-width="2" marker-end="url(#arro)"/>

  <rect x="40" y="200" width="260" height="64" rx="8" fill="#13241a" stroke="#3f6b49"/>
  <text x="56" y="222" fill="#7fcf8f" font-size="11.5" font-weight="700">уверена → канал закрыт (gain 0)</text>
  <text x="56" y="240" fill="#9aa3b2" font-size="10">отвечает / пишет код напрямую —</text>
  <text x="56" y="254" fill="#9aa3b2" font-size="10">длинный вывод чистый по построению</text>

  <rect x="320" y="200" width="260" height="64" rx="8" fill="#241a16" stroke="#f0b86e"/>
  <text x="336" y="222" fill="#f0b86e" font-size="11.5" font-weight="700">не уверена → ТОЧЕЧНАЯ инъекция</text>
  <text x="336" y="240" fill="#9aa3b2" font-size="10">gain 1.5 только в окне решения (tool_call),</text>
  <text x="336" y="254" fill="#9aa3b2" font-size="10">gain 0 на код — decide-then-detach</text>

  <rect x="600" y="200" width="260" height="64" rx="8" fill="#241a16" stroke="#7a5440"/>
  <text x="616" y="222" fill="#f0b86e" font-size="11.5" font-weight="700">не уверена → внешнее действие</text>
  <text x="616" y="240" fill="#9aa3b2" font-size="10">поиск / уточнить / эскалация — режим</text>
  <text x="616" y="254" fill="#9aa3b2" font-size="10">«только чтение», без инъекции вовсе</text>

  <path d="M760,152 C700,172 560,176 480,200" stroke="#f0b86e" stroke-width="1.5" fill="none" marker-end="url(#arro)"/>

  <!-- ===== принцип ===== -->
  <rect x="40" y="284" width="820" height="40" rx="10" fill="none" stroke="#3f6b49" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="56" y="309" fill="#7fcf8f" font-size="11">суть: инъекция — модулятор РЕШЕНИЯ, не генерации. Вне окна решения канал закрыт → off-task шум не копится на длинном выводе.</text>

  <!-- ===== почему гейтить: три формы ODEX ===== -->
  <text x="40" y="356" fill="#cfd6e2" font-size="12.5" font-weight="700">Почему гейтить — три формы на агентной кодовой задаче (ODEX, база решает 7/15)</text>
  <g font-size="11">
    <rect x="40" y="372" width="270" height="60" rx="8" fill="#0e1622" stroke="#7a5440"/>
    <text x="56" y="394" fill="#d9776c" font-size="11.5" font-weight="700">постоянная инъекция</text>
    <text x="56" y="414" fill="#9aa3b2">−3 — шум копится, портит длинный код</text>

    <rect x="320" y="372" width="270" height="60" rx="8" fill="#0e1622" stroke="#3f6b49"/>
    <text x="336" y="394" fill="#7fcf8f" font-size="11.5" font-weight="700">сторож → точечная инъекция</text>
    <text x="336" y="414" fill="#9aa3b2">+1, ноль потерь — инъекция реабилитирована</text>

    <rect x="600" y="372" width="260" height="60" rx="8" fill="#0e1622" stroke="#3f6b49"/>
    <text x="616" y="394" fill="#7fcf8f" font-size="11.5" font-weight="700">сторож → внешний поиск</text>
    <text x="616" y="414" fill="#9aa3b2">+1, ноль потерь (read-only режим)</text>
  </g>

  <!-- код -->
  <rect x="40" y="452" width="820" height="92" rx="8" fill="#0b0e14" stroke="#262b37"/>
  <text x="58" y="476" fill="#8a93a6" font-size="11" font-family="monospace">watch = Watchdog(ConfidenceProbe.load("probe.pt"))</text>
  <text x="58" y="498" fill="#8a93a6" font-size="11" font-family="monospace">if watch.is_uncertain(pipe, prompt):</text>
  <text x="90" y="520" fill="#8a93a6" font-size="11" font-family="monospace">pipe.set_gain(1.5)   # только на окно решения; после tool_call → set_gain(0), код чистый</text>
</svg>
