<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="579" rx="14" fill="#11141b" stroke="#262b37"/>
  <text x="40" y="38" fill="#cfd6e2" font-size="16" font-weight="700">Meta-Spider at a glance</text>
  <text x="40" y="58" fill="#9aa3b2" font-size="11.5">a thin trainable uncertainty wrapper on a FROZEN LLM — build it, it reads &amp; injects, you control or just read it, deploy anywhere.</text>

  <!-- ===================== A · BUILD (daimon-loom) ===================== -->
  <rect x="34" y="80" width="224" height="446" rx="12" fill="#0d1118" stroke="#5a4a2e"/>
  <text x="50" y="104" fill="#f0b86e" font-size="13" font-weight="700">BUILD</text>
  <text x="50" y="120" fill="#7a8493" font-size="10">the factory · daimon-loom</text>
  <text x="50" y="142" fill="#9aa3b2" font-size="10">metaloom build-universal --model N</text>

  <rect x="54" y="158" width="184" height="58" rx="8" fill="#0e1622" stroke="#f0b86e"/>
  <text x="146" y="180" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">balanced diverse mix</text>
  <text x="146" y="197" fill="#7a8493" font-size="9.5" text-anchor="middle">commit + hold, 6 axes</text>
  <text x="146" y="209" fill="#7a8493" font-size="9.5" text-anchor="middle">When2Call · PopQA · SQuAD2</text>
  <path d="M146,216 L146,236" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="238" width="184" height="40" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="256" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">collect</text>
  <text x="146" y="270" fill="#7a8493" font-size="9.5" text-anchor="middle">frozen base → activations</text>
  <path d="M146,278 L146,296" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="298" width="184" height="40" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="316" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">train (wrapper only)</text>
  <text x="146" y="330" fill="#7a8493" font-size="9.5" text-anchor="middle">base stays frozen</text>
  <path d="M146,338 L146,356" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="358" width="184" height="44" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="378" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">wrapper checkpoint</text>
  <text x="146" y="393" fill="#7a8493" font-size="9.5" text-anchor="middle">.pt · ~2% of base</text>

  <text x="146" y="440" fill="#7a8493" font-size="9.5" text-anchor="middle">--eval → floor / commit_mean</text>
  <text x="146" y="456" fill="#7a8493" font-size="9.5" text-anchor="middle">--suite → leakage guard</text>
  <text x="146" y="500" fill="#9aa3b2" font-size="10" text-anchor="middle" font-style="italic">one command,</text>
  <text x="146" y="514" fill="#9aa3b2" font-size="10" text-anchor="middle" font-style="italic">any base model</text>

  <!-- attach arrow A → B -->
  <path d="M258,290 L292,290" stroke="#8a93a6" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="275" y="282" fill="#9aa3b2" font-size="9.5" text-anchor="middle">attach</text>

  <!-- ===================== B · CORE (meta-attention) ===================== -->
  <rect x="296" y="80" width="300" height="446" rx="12" fill="#0d1118" stroke="#2f5a8a"/>
  <text x="312" y="104" fill="#5b8fd0" font-size="13" font-weight="700">THE WRAPPER on a frozen base</text>
  <text x="312" y="120" fill="#7a8493" font-size="10">the mechanism · meta-attention</text>

  <!-- frozen base -->
  <rect x="316" y="136" width="260" height="270" rx="10" fill="#0e1622" stroke="#3a4456"/>
  <text x="446" y="158" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">FROZEN base LLM</text>
  <text x="446" y="172" fill="#7a8493" font-size="9.5" text-anchor="middle">weights never change</text>
  <!-- layer stack -->
  <g>
    <rect x="338" y="186" width="92" height="200" rx="6" fill="#0b121c" stroke="#2a3342"/>
    <g fill="#1c2942" stroke="#33415c">
      <rect x="348" y="196" width="72" height="20" rx="3"/>
      <rect x="348" y="222" width="72" height="20" rx="3"/>
      <rect x="348" y="248" width="72" height="20" rx="3"/>
      <rect x="348" y="300" width="72" height="20" rx="3" fill="#234064"/>
      <rect x="348" y="326" width="72" height="20" rx="3" fill="#234064"/>
      <rect x="348" y="352" width="72" height="20" rx="3" fill="#234064"/>
    </g>
    <text x="384" y="282" fill="#7a8493" font-size="8.5" text-anchor="middle">… layers …</text>
    <text x="384" y="210" fill="#9fb4d4" font-size="8" text-anchor="middle">early</text>
    <text x="384" y="366" fill="#9fb4d4" font-size="8" text-anchor="middle">late</text>
  </g>
  <!-- encoder + cog tokens + CA -->
  <rect x="446" y="196" width="118" height="56" rx="7" fill="#0e1622" stroke="#2f5a8a"/>
  <text x="505" y="216" fill="#cfd6e2" font-size="10.5" font-weight="700" text-anchor="middle">① encoder</text>
  <text x="505" y="231" fill="#7a8493" font-size="9" text-anchor="middle">reads late-layer</text>
  <text x="505" y="243" fill="#7a8493" font-size="9" text-anchor="middle">activations</text>
  <path d="M430,300 C440,300 438,224 444,224" stroke="#8a93a6" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="446" y="262" width="118" height="40" rx="7" fill="#13243a" stroke="#2f5a8a"/>
  <text x="505" y="281" fill="#9fb4d4" font-size="10.5" font-weight="700" text-anchor="middle">cognitive tokens</text>
  <text x="505" y="294" fill="#7a8493" font-size="9" text-anchor="middle">compressed state</text>
  <path d="M505,252 L505,260" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="446" y="312" width="118" height="56" rx="7" fill="#0e1622" stroke="#2f5a8a"/>
  <text x="505" y="332" fill="#cfd6e2" font-size="10.5" font-weight="700" text-anchor="middle">② gated cross-attn</text>
  <text x="505" y="347" fill="#7a8493" font-size="9" text-anchor="middle">injects tokens back</text>
  <text x="505" y="359" fill="#7a8493" font-size="9" text-anchor="middle">into the residual</text>
  <path d="M505,302 L505,310" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M444,340 C436,340 430,346 422,346" stroke="#f0b86e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <text x="446" y="428" fill="#9aa3b2" font-size="10" text-anchor="middle">two-pass: Pass-1 read → Pass-2 inject</text>
  <text x="446" y="446" fill="#7a8493" font-size="9.5" text-anchor="middle">gradients flow through the frozen base; only the wrapper trains</text>
  <text x="446" y="468" fill="#5b8fd0" font-size="11" text-anchor="middle" font-weight="700">→ calibrated decision: answer · tool · clarify · refuse</text>

  <!-- run arrow B → C -->
  <path d="M596,290 L630,290" stroke="#8a93a6" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="613" y="282" fill="#9aa3b2" font-size="9.5" text-anchor="middle">run</text>

  <!-- ===================== C · USE ===================== -->
  <text x="642" y="104" fill="#cfd6e2" font-size="13" font-weight="700">USE &amp; CONTROL</text>

  <!-- gain -->
  <rect x="636" y="116" width="228" height="84" rx="9" fill="#0e1622" stroke="#f0b86e"/>
  <text x="652" y="138" fill="#f0b86e" font-size="11.5" font-weight="700">gain knob <tspan fill="#7a8493" font-weight="400" font-size="9">· meta-attention</tspan></text>
  <text x="652" y="156" fill="#9aa3b2" font-size="9.5">runtime dial on injection strength</text>
  <line x1="652" y1="178" x2="848" y2="178" stroke="#3a4456" stroke-width="4" stroke-linecap="round"/>
  <line x1="652" y1="178" x2="760" y2="178" stroke="#2f5a8a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="760" cy="178" r="6" fill="#f0b86e"/>
  <text x="652" y="194" fill="#7a8493" font-size="8.5">0=base</text><text x="848" y="194" fill="#7a8493" font-size="8.5" text-anchor="end">2.0=max</text>

  <!-- watchdog -->
  <rect x="636" y="208" width="228" height="92" rx="9" fill="#0e1622" stroke="#3f6b49"/>
  <text x="652" y="230" fill="#7fcf8f" font-size="11.5" font-weight="700">Watchdog <tspan fill="#7a8493" font-weight="400" font-size="9">· daimon-voices</tspan></text>
  <text x="652" y="248" fill="#9aa3b2" font-size="9.5">read-only sensor (ConfidenceProbe)</text>
  <text x="652" y="265" fill="#9aa3b2" font-size="9.5">verdict → external action:</text>
  <text x="652" y="281" fill="#7a8493" font-size="9.5">retrieve · clarify · escalate</text>
  <text x="652" y="295" fill="#7fcf8f" font-size="9">generation never modified</text>

  <!-- agent -->
  <rect x="636" y="308" width="228" height="64" rx="9" fill="#0e1622" stroke="#5a8f6a"/>
  <text x="652" y="330" fill="#7fcf8f" font-size="11.5" font-weight="700">agentic runtime <tspan fill="#7a8493" font-weight="400" font-size="9">· daimon-agent</tspan></text>
  <text x="652" y="348" fill="#9aa3b2" font-size="9.5">native tool-use loop; the signal</text>
  <text x="652" y="362" fill="#9aa3b2" font-size="9.5">routes into the action</text>

  <!-- deploy -->
  <rect x="636" y="380" width="228" height="64" rx="9" fill="#0e1622" stroke="#7a5ea0"/>
  <text x="652" y="402" fill="#b08ad6" font-size="11.5" font-weight="700">deploy <tspan fill="#7a8493" font-weight="400" font-size="9">· daimon-deploy</tspan></text>
  <text x="652" y="420" fill="#9aa3b2" font-size="9.5">GGUF sidecar → llama.cpp (CPU)</text>
  <text x="652" y="434" fill="#9aa3b2" font-size="9.5">same dial via META_GAIN</text>

  <!-- ===================== legend ===================== -->
  <text x="40" y="552" fill="#7a8493" font-size="10">packages:</text>
  <g font-size="10" fill="#9aa3b2">
    <rect x="104" y="544" width="10" height="10" rx="2" fill="#2f5a8a"/><text x="120" y="553">meta-attention</text>
    <rect x="196" y="544" width="10" height="10" rx="2" fill="#f0b86e"/><text x="212" y="553">daimon-loom</text>
    <rect x="290" y="544" width="10" height="10" rx="2" fill="#7fcf8f"/><text x="306" y="553">daimon-agent</text>
    <rect x="388" y="544" width="10" height="10" rx="2" fill="#b08ad6"/><text x="404" y="553">daimon-deploy</text>
  </g>
  <text x="860" y="553" fill="#7a8493" font-size="9.5" text-anchor="end">base frozen · wrapper ~2% · model-specific</text>
</svg>
