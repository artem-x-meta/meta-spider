<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="469" rx="14" fill="#11141b" stroke="#262b37"/>

  <text x="40" y="44" fill="#cfd6e2" font-size="13.5" font-weight="700">meta-spider — четыре pip-пакета: общее ядро + три независимых потребителя</text>

  <!-- ===== consumers ===== -->
  <!-- meta-loom -->
  <rect x="40" y="74" width="257" height="156" rx="10" fill="#211c12" stroke="#f0b86e"/>
  <text x="58" y="104" fill="#f0b86e" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-loom</text>
  <text x="58" y="123" fill="#cfd6e2" font-size="11" font-weight="600">обучение и оценка</text>
  <text x="58" y="146" fill="#9aa3b2" font-size="10.3">собрать активации, обучить</text>
  <text x="58" y="161" fill="#9aa3b2" font-size="10.3">обвязку (backprop сквозь базу),</text>
  <text x="58" y="176" fill="#9aa3b2" font-size="10.3">честно измерить пользу.</text>
  <text x="58" y="197" fill="#9aa3b2" font-size="10.3">CLI metaloom + метрики</text>
  <text x="58" y="212" fill="#9aa3b2" font-size="10.3">со стат-тестами</text>

  <!-- meta-agent -->
  <rect x="321" y="74" width="257" height="156" rx="10" fill="#16241f" stroke="#7ee0c0"/>
  <text x="339" y="104" fill="#7ee0c0" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-agent</text>
  <text x="339" y="123" fill="#cfd6e2" font-size="11" font-weight="600">агентный рантайм и чат</text>
  <text x="339" y="146" fill="#9aa3b2" font-size="10.3">обвязка в агентной петле</text>
  <text x="339" y="161" fill="#9aa3b2" font-size="10.3">с инструментами и историей;</text>
  <text x="339" y="176" fill="#9aa3b2" font-size="10.3">нативный tool-use для</text>
  <text x="339" y="191" fill="#9aa3b2" font-size="10.3">instruct-моделей</text>

  <!-- meta-deploy -->
  <rect x="602" y="74" width="258" height="156" rx="10" fill="#1d1726" stroke="#b496f0"/>
  <text x="620" y="104" fill="#b496f0" font-size="14.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-deploy</text>
  <text x="620" y="123" fill="#cfd6e2" font-size="11" font-weight="600">деплой в llama.cpp</text>
  <text x="620" y="146" fill="#9aa3b2" font-size="10.3">экспорт в GGUF-сайдкар +</text>
  <text x="620" y="161" fill="#9aa3b2" font-size="10.3">ggml/C++ forward →</text>
  <text x="620" y="176" fill="#9aa3b2" font-size="10.3">калиброванный отказ без</text>
  <text x="620" y="191" fill="#9aa3b2" font-size="10.3">CUDA/PyTorch (CPU · edge)</text>

  <!-- loom → agent secondary edge -->
  <path d="M297,150 L319,150" stroke="#6e7688" stroke-width="1.4" fill="none" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="309" y="142" fill="#6e7688" font-size="8.5" text-anchor="middle">зовёт</text>

  <!-- depend arrows down to core -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M168,230 L168,296"/>
    <path d="M449,230 L449,296"/>
    <path d="M731,230 L731,296"/>
  </g>
  <text x="449" y="282" fill="#9aa3b2" font-size="10" text-anchor="middle">зависят от ядра ↓</text>

  <!-- ===== core (foundation) ===== -->
  <rect x="40" y="298" width="820" height="108" rx="10" fill="#182030" stroke="#6ea8fe" stroke-width="1.8"/>
  <text x="60" y="330" fill="#6ea8fe" font-size="15.5" font-weight="700" font-family="ui-monospace, Consolas, monospace">meta-core</text>
  <text x="168" y="330" fill="#cfd6e2" font-size="12.5" font-weight="600">· ядро инференса</text>
  <text x="60" y="354" fill="#9aa3b2" font-size="10.5">двухпроходный механизм: замороженная база + тонкая обвязка · хуки ·</text>
  <text x="60" y="372" fill="#9aa3b2" font-size="10.5">когнитивный энкодер · gated cross-attention · контракт чекпойнта</text>
  <text x="60" y="390" fill="#9aa3b2" font-size="10.5">всё, что нужно, чтобы прогнать уже обученную обвязку</text>
  <rect x="600" y="326" width="244" height="26" rx="7" fill="#16241f" stroke="#7ee0c0"/>
  <text x="722" y="343" fill="#7ee0c0" font-size="10.5" font-weight="600" text-anchor="middle">прод-инференс = только meta-core</text>

  <!-- note -->
  <text x="450" y="442" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">ядро общее для всех; обучение / агентность / деплой — три независимых потребителя под свою задачу</text>
</svg>
