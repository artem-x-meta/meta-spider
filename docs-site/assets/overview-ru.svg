<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="579" rx="14" fill="#11141b" stroke="#262b37"/>
  <text x="40" y="38" fill="#cfd6e2" font-size="16" font-weight="700">Meta-Spider — общая картина</text>
  <text x="40" y="58" fill="#9aa3b2" font-size="11.5">тонкая обучаемая обвязка неуверенности на ЗАМОРОЖЕННОЙ LLM — строим, она читает и впрыскивает, ей рулят или просто читают, деплоят везде.</text>

  <!-- ===================== A · BUILD (meta-loom) ===================== -->
  <rect x="34" y="80" width="224" height="446" rx="12" fill="#0d1118" stroke="#5a4a2e"/>
  <text x="50" y="104" fill="#f0b86e" font-size="13" font-weight="700">СБОРКА</text>
  <text x="50" y="120" fill="#7a8493" font-size="10">фабрика · meta-loom</text>
  <text x="50" y="142" fill="#9aa3b2" font-size="10">metaloom build-universal --model N</text>

  <rect x="54" y="158" width="184" height="58" rx="8" fill="#0e1622" stroke="#f0b86e"/>
  <text x="146" y="180" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">сбаланс. диверс-микс</text>
  <text x="146" y="197" fill="#7a8493" font-size="9.5" text-anchor="middle">commit + hold, 6 осей</text>
  <text x="146" y="209" fill="#7a8493" font-size="9.5" text-anchor="middle">When2Call · PopQA · SQuAD2</text>
  <path d="M146,216 L146,236" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="238" width="184" height="40" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="256" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">collect</text>
  <text x="146" y="270" fill="#7a8493" font-size="9.5" text-anchor="middle">замор. база → активации</text>
  <path d="M146,278 L146,296" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="298" width="184" height="40" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="316" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">train (только обвязка)</text>
  <text x="146" y="330" fill="#7a8493" font-size="9.5" text-anchor="middle">база заморожена</text>
  <path d="M146,338 L146,356" stroke="#8a93a6" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="54" y="358" width="184" height="44" rx="8" fill="#0e1622" stroke="#3a4456"/>
  <text x="146" y="378" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">чекпоинт обвязки</text>
  <text x="146" y="393" fill="#7a8493" font-size="9.5" text-anchor="middle">.pt · ~2% от базы</text>

  <text x="146" y="440" fill="#7a8493" font-size="9.5" text-anchor="middle">--eval → floor / commit_mean</text>
  <text x="146" y="456" fill="#7a8493" font-size="9.5" text-anchor="middle">--suite → защита от утечки</text>
  <text x="146" y="500" fill="#9aa3b2" font-size="10" text-anchor="middle" font-style="italic">одна команда,</text>
  <text x="146" y="514" fill="#9aa3b2" font-size="10" text-anchor="middle" font-style="italic">любая базовая модель</text>

  <!-- attach arrow A → B -->
  <path d="M258,290 L292,290" stroke="#8a93a6" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="275" y="282" fill="#9aa3b2" font-size="9.5" text-anchor="middle">attach</text>

  <!-- ===================== B · CORE (meta-core) ===================== -->
  <rect x="296" y="80" width="300" height="446" rx="12" fill="#0d1118" stroke="#2f5a8a"/>
  <text x="312" y="104" fill="#5b8fd0" font-size="13" font-weight="700">ОБВЯЗКА на замороженной базе</text>
  <text x="312" y="120" fill="#7a8493" font-size="10">механизм · meta-core</text>

  <!-- frozen base -->
  <rect x="316" y="136" width="260" height="270" rx="10" fill="#0e1622" stroke="#3a4456"/>
  <text x="446" y="158" fill="#cfd6e2" font-size="11.5" font-weight="700" text-anchor="middle">ЗАМОРОЖЕННАЯ база LLM</text>
  <text x="446" y="172" fill="#7a8493" font-size="9.5" text-anchor="middle">веса не меняются</text>
  <g>
    <rect x="338" y="186" width="92" height="200" rx="6" fill="#0b121c" stroke="#2a3342"/>
    <g fill="#1c2942" stroke="#33415c">
      <rect x="348" y="196" width="72" height="20" rx="3"/>
      <rect x="348" y="222" width="72" height="20" rx="3"/>
      <rect x="348" y="248" width="72" height="20" rx="3"/>
      <rect x="348" y="300" width="72" height="20" rx="3" fill="#234064"/>
      <rect x="348" y="326" width="72" height="20" rx="3" fill="#234064"/>
      <rect x="348" y="352" width="72" height="20" rx="3" fill="#234064"/>
    </g>
    <text x="384" y="282" fill="#7a8493" font-size="8.5" text-anchor="middle">… слои …</text>
    <text x="384" y="210" fill="#9fb4d4" font-size="8" text-anchor="middle">ранние</text>
    <text x="384" y="366" fill="#9fb4d4" font-size="8" text-anchor="middle">поздние</text>
  </g>
  <rect x="446" y="196" width="118" height="56" rx="7" fill="#0e1622" stroke="#2f5a8a"/>
  <text x="505" y="216" fill="#cfd6e2" font-size="10.5" font-weight="700" text-anchor="middle">① энкодер</text>
  <text x="505" y="231" fill="#7a8493" font-size="9" text-anchor="middle">читает активации</text>
  <text x="505" y="243" fill="#7a8493" font-size="9" text-anchor="middle">поздних слоёв</text>
  <path d="M430,300 C440,300 438,224 444,224" stroke="#8a93a6" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <rect x="446" y="262" width="118" height="40" rx="7" fill="#13243a" stroke="#2f5a8a"/>
  <text x="505" y="281" fill="#9fb4d4" font-size="10.5" font-weight="700" text-anchor="middle">когнитивные токены</text>
  <text x="505" y="294" fill="#7a8493" font-size="9" text-anchor="middle">сжатое состояние</text>
  <path d="M505,252 L505,260" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="446" y="312" width="118" height="56" rx="7" fill="#0e1622" stroke="#2f5a8a"/>
  <text x="505" y="332" fill="#cfd6e2" font-size="10.5" font-weight="700" text-anchor="middle">② cross-attn + врата</text>
  <text x="505" y="347" fill="#7a8493" font-size="9" text-anchor="middle">впрыск токенов</text>
  <text x="505" y="359" fill="#7a8493" font-size="9" text-anchor="middle">обратно в residual</text>
  <path d="M505,302 L505,310" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M444,340 C436,340 430,346 422,346" stroke="#f0b86e" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <text x="446" y="428" fill="#9aa3b2" font-size="10" text-anchor="middle">два прохода: Pass-1 читать → Pass-2 впрыснуть</text>
  <text x="446" y="446" fill="#7a8493" font-size="9.5" text-anchor="middle">градиенты идут сквозь замор. базу; учится только обвязка</text>
  <text x="446" y="468" fill="#5b8fd0" font-size="11" text-anchor="middle" font-weight="700">→ калиброванное решение: ответ · тул · уточнить · отказ</text>

  <!-- run arrow B → C -->
  <path d="M596,290 L630,290" stroke="#8a93a6" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="613" y="282" fill="#9aa3b2" font-size="9.5" text-anchor="middle">run</text>

  <!-- ===================== C · USE ===================== -->
  <text x="642" y="104" fill="#cfd6e2" font-size="13" font-weight="700">ИСПОЛЬЗОВАНИЕ</text>

  <!-- gain -->
  <rect x="636" y="116" width="228" height="84" rx="9" fill="#0e1622" stroke="#f0b86e"/>
  <text x="652" y="138" fill="#f0b86e" font-size="11.5" font-weight="700">ручка gain <tspan fill="#7a8493" font-weight="400" font-size="9">· meta-core</tspan></text>
  <text x="652" y="156" fill="#9aa3b2" font-size="9.5">регулятор силы инъекции на лету</text>
  <line x1="652" y1="178" x2="848" y2="178" stroke="#3a4456" stroke-width="4" stroke-linecap="round"/>
  <line x1="652" y1="178" x2="760" y2="178" stroke="#2f5a8a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="760" cy="178" r="6" fill="#f0b86e"/>
  <text x="652" y="194" fill="#7a8493" font-size="8.5">0=база</text><text x="848" y="194" fill="#7a8493" font-size="8.5" text-anchor="end">2.0=макс</text>

  <!-- watchdog -->
  <rect x="636" y="208" width="228" height="92" rx="9" fill="#0e1622" stroke="#3f6b49"/>
  <text x="652" y="230" fill="#7fcf8f" font-size="11.5" font-weight="700">Сторож <tspan fill="#7a8493" font-weight="400" font-size="9">· meta-core</tspan></text>
  <text x="652" y="248" fill="#9aa3b2" font-size="9.5">датчик «только чтение» (ConfidenceProbe)</text>
  <text x="652" y="265" fill="#9aa3b2" font-size="9.5">вердикт → внешнее действие:</text>
  <text x="652" y="281" fill="#7a8493" font-size="9.5">поиск · уточнить · эскалация</text>
  <text x="652" y="295" fill="#7fcf8f" font-size="9">генерация не изменяется</text>

  <!-- agent -->
  <rect x="636" y="308" width="228" height="64" rx="9" fill="#0e1622" stroke="#5a8f6a"/>
  <text x="652" y="330" fill="#7fcf8f" font-size="11.5" font-weight="700">агентный рантайм <tspan fill="#7a8493" font-weight="400" font-size="9">· meta-agent</tspan></text>
  <text x="652" y="348" fill="#9aa3b2" font-size="9.5">нативная тул-петля; сигнал</text>
  <text x="652" y="362" fill="#9aa3b2" font-size="9.5">роутится в действие</text>

  <!-- deploy -->
  <rect x="636" y="380" width="228" height="64" rx="9" fill="#0e1622" stroke="#7a5ea0"/>
  <text x="652" y="402" fill="#b08ad6" font-size="11.5" font-weight="700">деплой <tspan fill="#7a8493" font-weight="400" font-size="9">· meta-deploy</tspan></text>
  <text x="652" y="420" fill="#9aa3b2" font-size="9.5">GGUF-sidecar → llama.cpp (CPU)</text>
  <text x="652" y="434" fill="#9aa3b2" font-size="9.5">та же ручка через META_GAIN</text>

  <!-- ===================== legend ===================== -->
  <text x="40" y="552" fill="#7a8493" font-size="10">пакеты:</text>
  <g font-size="10" fill="#9aa3b2">
    <rect x="92" y="544" width="10" height="10" rx="2" fill="#2f5a8a"/><text x="108" y="553">meta-core</text>
    <rect x="184" y="544" width="10" height="10" rx="2" fill="#f0b86e"/><text x="200" y="553">meta-loom</text>
    <rect x="278" y="544" width="10" height="10" rx="2" fill="#7fcf8f"/><text x="294" y="553">meta-agent</text>
    <rect x="376" y="544" width="10" height="10" rx="2" fill="#b08ad6"/><text x="392" y="553">meta-deploy</text>
  </g>
  <text x="860" y="553" fill="#7a8493" font-size="9.5" text-anchor="end">база заморожена · обвязка ~2% · модельно-специфична</text>
</svg>
