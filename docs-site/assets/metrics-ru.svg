<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="899" height="499" rx="14" fill="#11141b" stroke="#262b37"/>

  <text x="40" y="42" fill="#cfd6e2" font-size="13.5" font-weight="700">Откуда берутся метрики — четыре исхода каждого вопроса</text>
  <text x="40" y="61" fill="#6e7688" font-size="11">пример: Granite-3.3-8B, MMLU, n = 300</text>

  <!-- column headers -->
  <text x="408" y="104" fill="#6ea8fe" font-size="13" font-weight="700" text-anchor="middle">модель ОТВЕТИЛА</text>
  <text x="408" y="120" fill="#9aa3b2" font-size="10" text-anchor="middle">покрытие · 164 (55%)</text>
  <text x="633" y="104" fill="#cfd6e2" font-size="13" font-weight="700" text-anchor="middle">модель ОТКАЗАЛАСЬ</text>
  <text x="633" y="120" fill="#9aa3b2" font-size="10" text-anchor="middle">отказы · 136 (45%)</text>

  <!-- row headers -->
  <text x="288" y="180" fill="#cfd6e2" font-size="11.5" font-weight="600" text-anchor="end">база была бы права</text>
  <text x="288" y="196" fill="#6e7688" font-size="10" text-anchor="end">pass1_correct ✓</text>
  <text x="288" y="290" fill="#cfd6e2" font-size="11.5" font-weight="600" text-anchor="end">база ошиблась бы</text>
  <text x="288" y="306" fill="#6e7688" font-size="10" text-anchor="end">pass1_correct ✗</text>

  <!-- cells -->
  <rect x="302" y="132" width="211" height="92" rx="9" fill="#14211b" stroke="#7ee0c0"/>
  <text x="408" y="172" fill="#cfd6e2" font-size="11.5" text-anchor="middle">верный ответ</text>
  <text x="408" y="200" fill="#7ee0c0" font-size="20" font-weight="700" text-anchor="middle">126</text>

  <rect x="527" y="132" width="211" height="92" rx="9" fill="#211c12" stroke="#f0b86e"/>
  <text x="633" y="172" fill="#cfd6e2" font-size="11.5" text-anchor="middle">переотказ (зря смолчала)</text>
  <text x="633" y="200" fill="#f0b86e" font-size="20" font-weight="700" text-anchor="middle">59</text>

  <rect x="302" y="234" width="211" height="92" rx="9" fill="#251417" stroke="#e88a8a"/>
  <text x="408" y="274" fill="#cfd6e2" font-size="11.5" text-anchor="middle">уверенная ошибка</text>
  <text x="408" y="302" fill="#e88a8a" font-size="20" font-weight="700" text-anchor="middle">38</text>

  <rect x="527" y="234" width="211" height="92" rx="9" fill="#14211b" stroke="#7ee0c0"/>
  <text x="633" y="274" fill="#cfd6e2" font-size="11.5" text-anchor="middle">оправданный отказ</text>
  <text x="633" y="302" fill="#7ee0c0" font-size="20" font-weight="700" text-anchor="middle">77</text>

  <!-- brackets under columns -->
  <path d="M302,338 L302,346 L513,346 L513,338" stroke="#6ea8fe" stroke-width="1.4" fill="none"/>
  <path d="M527,338 L527,346 L738,346 L738,338" stroke="#f0b86e" stroke-width="1.4" fill="none"/>

  <!-- metric labels -->
  <text x="408" y="368" fill="#7ee0c0" font-size="12.5" font-weight="700" text-anchor="middle">Selective accuracy</text>
  <text x="408" y="386" fill="#9aa3b2" font-size="10.5" text-anchor="middle">верные / все ответы = 126 / 164 = 0.77</text>
  <text x="408" y="401" fill="#6e7688" font-size="10" text-anchor="middle">(база — 0.63)</text>

  <text x="633" y="368" fill="#f0b86e" font-size="12.5" font-weight="700" text-anchor="middle">Refusal precision · Over-refusal</text>
  <text x="633" y="386" fill="#9aa3b2" font-size="10.5" text-anchor="middle">77 / 136 = 0.57   ·   59 / 136 = 0.43</text>
  <text x="633" y="401" fill="#6e7688" font-size="10" text-anchor="middle">оправдан / отказы   ·   переотказ / отказы</text>

  <!-- side: total recovery on bottom row -->
  <path d="M748,234 L756,234 L756,326 L748,326" stroke="#7ee0c0" stroke-width="1.4" fill="none"/>
  <text x="764" y="276" fill="#7ee0c0" font-size="10.5" font-weight="600">Total recovery</text>
  <text x="764" y="291" fill="#9aa3b2" font-size="9.5">спасено / база-врёт</text>
  <text x="764" y="305" fill="#9aa3b2" font-size="9.5">77 / 115 ≈ 0.67</text>

  <!-- bottom note -->
  <text x="450" y="448" fill="#cfd6e2" font-size="11.5" text-anchor="middle">почти каждая метрика — это просто доля в этой 2×2</text>
  <text x="450" y="470" fill="#6e7688" font-size="11" text-anchor="middle" font-style="italic">одно число врёт — польза = рост selective accuracy при понятной цене over-refusal</text>
</svg>
