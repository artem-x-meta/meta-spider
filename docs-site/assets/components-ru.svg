<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a93a6"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="529" rx="14" fill="#11141b" stroke="#262b37"/>

  <!-- frozen base -->
  <rect x="40" y="36" width="818" height="48" rx="9" fill="#1a1f29" stroke="#3a4456"/>
  <text x="449" y="65" fill="#cfd6e2" font-size="14" font-weight="600" text-anchor="middle">Замороженная база — слои  L0 · L1 · … · Ln</text>

  <!-- loop arrows -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M132,86 L132,196"/>
    <path d="M766,196 L766,86"/>
  </g>
  <text x="146" y="126" fill="#9aa3b2" font-size="11">снимаем</text>
  <text x="146" y="141" fill="#9aa3b2" font-size="11">активации</text>
  <text x="752" y="126" fill="#7ee0c0" font-size="11" text-anchor="end">впрыск обратно</text>
  <text x="752" y="141" fill="#9aa3b2" font-size="11" text-anchor="end">(cross-attention)</text>
  <text x="449" y="160" fill="#6e7688" font-size="11.5" text-anchor="middle" font-style="italic">петля интроспекции на той же замороженной базе</text>

  <!-- flow between cards -->
  <g stroke="#7a8493" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <path d="M226,278 L248,278"/>
    <path d="M437,278 L459,278"/>
    <path d="M648,278 L670,278"/>
  </g>

  <!-- card 1: hooks -->
  <rect x="40" y="200" width="185" height="160" rx="10" fill="#1a2030" stroke="#6ea8fe"/>
  <circle cx="62" cy="224" r="12" fill="#6ea8fe"/>
  <text x="62" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="54" y="262" fill="#6ea8fe" font-size="12.5" font-weight="600">Хуки активации</text>
  <text x="54" y="288" fill="#aab2c0" font-size="10.5">снимают активации</text>
  <text x="54" y="304" fill="#aab2c0" font-size="10.5">модели — скрытые</text>
  <text x="54" y="320" fill="#aab2c0" font-size="10.5">состояния на слоях</text>

  <!-- card 2: encoder -->
  <rect x="251" y="200" width="185" height="160" rx="10" fill="#182030" stroke="#6ea8fe"/>
  <circle cx="273" cy="224" r="12" fill="#6ea8fe"/>
  <text x="273" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="265" y="262" fill="#6ea8fe" font-size="12.5" font-weight="600">Когнитивный энкодер</text>
  <text x="265" y="288" fill="#aab2c0" font-size="10.5">сжимает активации в</text>
  <text x="265" y="304" fill="#aab2c0" font-size="10.5">когнитивные токены —</text>
  <text x="265" y="320" fill="#aab2c0" font-size="10.5">по одному на слой</text>

  <!-- card 3: gates -->
  <rect x="462" y="200" width="185" height="160" rx="10" fill="#211c12" stroke="#f0b86e"/>
  <circle cx="484" cy="224" r="12" fill="#f0b86e"/>
  <text x="484" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="476" y="262" fill="#f0b86e" font-size="12.5" font-weight="600">Врата</text>
  <text x="476" y="288" fill="#aab2c0" font-size="10.5">скалярный множитель:</text>
  <text x="476" y="304" fill="#aab2c0" font-size="10.5">насколько слою нужна</text>
  <text x="476" y="320" fill="#aab2c0" font-size="10.5">интроспекция (tanh)</text>

  <!-- card 4: heads -->
  <rect x="673" y="200" width="185" height="160" rx="10" fill="#16241f" stroke="#7ee0c0"/>
  <circle cx="695" cy="224" r="12" fill="#7ee0c0"/>
  <text x="695" y="228.5" fill="#11141b" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <text x="687" y="262" fill="#7ee0c0" font-size="12.5" font-weight="600">Головы мета-внимания</text>
  <text x="687" y="288" fill="#aab2c0" font-size="10.5">голова на каждый слой.</text>
  <text x="687" y="304" fill="#aab2c0" font-size="10.5">cross-attention: сколько</text>
  <text x="687" y="320" fill="#aab2c0" font-size="10.5">каждого ког-токена</text>
  <text x="687" y="336" fill="#aab2c0" font-size="10.5">влить в свой слой</text>

  <!-- formula strip -->
  <text x="449" y="424" fill="#9aa3b2" font-size="13" text-anchor="middle" font-family="ui-monospace, Consolas, monospace">hidden  +=  tanh(<tspan fill="#f0b86e">врата</tspan>) · <tspan fill="#7ee0c0">CA</tspan>(hidden, <tspan fill="#6ea8fe">когнитивные токены</tspan>)</text>
  <text x="449" y="456" fill="#6e7688" font-size="11" text-anchor="middle">Q — из живого hidden слоя · K/V — из когнитивных токенов · база не обучается</text>
</svg>
